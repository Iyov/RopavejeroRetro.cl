name: Actualizar Instagram Posts

on:
  schedule:
    - cron: '0 */12 * * *' # Se ejecuta cada 12 horas
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permite escribir en el repositorio

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script de actualización
      env:
        INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
      run: python api/update_instagram.py

    - name: Commit y Push de los cambios
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        
        # Verificar si hay cambios
        if git diff --quiet && git diff --staged --quiet; then
          echo "No hay cambios para commitear"
        else
          # Leer el mensaje de commit generado por el script
          if [ -f commit_message.txt ] && [ -s commit_message.txt ]; then
            COMMIT_MSG=$(cat commit_message.txt)
            git commit -m "$COMMIT_MSG"
            git push
            echo "Cambios pusheados: $COMMIT_MSG"
          else
            echo "No se generó mensaje de commit, no hay cambios en Instagram"
          fi
        fi
